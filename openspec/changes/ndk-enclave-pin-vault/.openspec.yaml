context: |
  Phase 2 — C++ NDK memory-locked enclave (libvault_enclave.so) using mlock(),
  Android Keystore NDK API (AKeyStore) for direct PIN decryption into locked
  buffers, PIN-to-coordinate mapper, and explicit_bzero() memory sanitization.
  The JVM never possesses the plaintext PIN string — only anonymous float[x,y]
  coordinate pairs cross the JNI boundary. Guard pages detect buffer overflows.
  V6 Alignment: Critical V6 defense eliminating PIN extraction via memory dump.
    Enables Ghost Actuator's blind gesture injection. Blocking eidas-qes-hardware-gate
    which needs enclave for PIN2 handling. Builds on completed usb-aoa-transport-proxy
    for command delivery that authorizes PIN decryption.
