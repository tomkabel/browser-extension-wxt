context: |
  Universal content script injection with matches: ["*://*/*"] replacing hardcoded
  domain list. Self-destruct pattern: script unregisters after 3s if no login form
  detected. Dynamic registration via chrome.scripting.registerContentScripts for
  approved domains with domain permission prompt on first visit. Approved domains
  persisted in chrome.storage.sync and re-registered on extension restart. Settings
  panel lists approved domains with Revoke. The scripting permission is added to
  the manifest.
