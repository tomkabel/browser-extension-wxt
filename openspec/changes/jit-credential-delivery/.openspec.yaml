context: |
  Phase 4 — JIT Authentication & UX: Phone acts as vault, delivers single-site
  credentials on demand. Laptop is a "dumb terminal" — zero persistent crypto.
  Context-aware biometric prompt (auto-approve when unlocked, notification when locked).
  V6 Alignment: The "credential" concept in V6 shifts from website passwords to
    Smart-ID PIN1/PIN2. The JIT delivery mechanism is refactored: instead of
    delivering decrypted passwords to the extension for DOM injection, it delivers
    PIN decryption authorization to the NDK enclave for coordinate mapping. The
    context-aware approval logic (auto-approve vs biometric prompt) is retained
    and extended with the eIDAS QES hardware gate for PIN2 requests.
