context: |
  Phase 2 — Resilient Transport: ICE candidate waterfall (mDNS → TURN/UDP → TURN/TCP 443).
  Deploy coturn with ephemeral HMAC credentials. Connection state machine
  with automatic retry and exponential backoff. Offscreen document lifecycle
  keeps WebRTC alive across SW sleep/wake cycles.
  V6 Alignment: WebRTC becomes the secondary/fallback transport in V6. The primary
    transport is USB AOA 2.0 via a Go Native Messaging Host. TURN/STUN infrastructure
    is still needed for the WebRTC fallback path. The ICE candidate waterfall and
    connection resilience logic are adapted into the Transport abstraction layer
    that unifies WebRTC + USB behind a common interface. Keep building this for
    Phase 1; it directly feeds into the Transport abstraction in Phase 1.5.
