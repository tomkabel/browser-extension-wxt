schema: spec-driven
created: 2026-05-03
context: |
  Phase 1.5 — Strategic planning artifact (no code changes). Defines the sequenced
  migration from the current WebRTC-based phone-as-vault architecture to the V6
  USB-AOA architecture. Specifies four sub-phases (1.5 Bridge → 2A Core Enclave →
  2B zkTLS + WebAuthn → 2C eIDAS QES), the Transport abstraction interface for
  WebRTC/USB coexistence, component retention vs replacement table, dependency
  graph, phase transition triggers, and deprecation policy for Phase 1 capabilities.
  V6 Alignment: Ensures coherent delivery of all V6 components without breaking
    the working WebRTC transport. All V6 changes reference this strategy for
    sequencing and integration guidance.
