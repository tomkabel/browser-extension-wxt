context: |
  Phase 2 — WASM-compiled TLSNotary/DECO MPC prover running in the extension's
  Offscreen Document. Generates a zero-knowledge proof that a specific control
  code string appeared in a TLS 1.3 server response from a whitelisted RP.
  Proof size target <4KB for efficient transport over USB/WebRTC. Android-side
  verification using the bank/RP's TLS certificate public key. Enables
  mathematical certainty about network truth, defeating RAT/DOM manipulation.
  V6 Alignment: Core V6 Layer 1 defense. Blocked on TLSNotary licensing/audit
    for WASM compilation. Blocking challenge-bound-webauthn which needs the zkTLS
    proof as WebAuthn challenge input. Depends on completed usb-aoa-transport-proxy
    for proof delivery to Android for verification.
