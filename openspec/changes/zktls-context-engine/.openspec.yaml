context: >
  Phase 2 progressive TLS binding proof system (three tiers):
  Tier 1: Sec-Fetch-* header capture via webRequest (zero infra, works today)
  Tier 2: WebTransport Token Binding (requires RP endpoint)
  Tier 3: SmartID-Attestation ECDSA P-256 signed header verification
  Replaces the monolithic zkTLS/zkTLS concept with a tiered approach.
v6_alignment: >
  Core V6 Layer 1 defense. Three tiers provide progressively stronger
  cryptographic guarantees with graduated infrastructure requirements.
  Tier 1 requires no bank cooperation. Blocks challenge-bound-webauthn.
