context: |
  Phase 2 — Cryptographic binding of zkTLS proof, transaction origin, control code,
  and session nonce into a SHA-256 WebAuthn challenge. This prevents DOM/RAT attacks:
  the PC biometric (Windows Hello/TouchID) is mathematically fused to the exact
  transaction. Challenge derivation uses canonical TLV serialization. The Android
  Vault recomputes the challenge and verifies the WebAuthn assertion signature
  against a Passkey public key provisioned during Phase 0 pairing.
  V6 Alignment: Core V6 cryptographic layer. Implemented on top of the completed
    usb-aoa-transport-proxy (Go Native Messaging Host + AOA 2.0, all 74 tasks
    complete). The zkTLS proof from zktls-context-engine feeds the challenge input.
    The Android-side verification uses the WebAuthn verifier running in the Java
    Orchestrator. Passkey provisioning happens during USB AOA Phase 0 pairing.
