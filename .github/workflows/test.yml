name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run tsc --noEmit

      - name: Run unit/integration tests
        run: bun run test

  go-native-host:
    name: Go Native Host
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/native-host/go.mod

      - name: Go test
        working-directory: apps/native-host
        run: go test ./... -race -count=1

      - name: Go vet
        working-directory: apps/native-host
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2024.1.1

      - name: Staticcheck
        working-directory: apps/native-host
        run: staticcheck ./...

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-and-integration, go-native-host]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium with dependencies
        run: bunx playwright install --with-deps chromium

      - name: Build extension
        run: bun run build

      - name: Run E2E tests
        run: bun run test:e2e
