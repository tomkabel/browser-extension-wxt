# SmartID2 TURN/STUN server configuration
# Deployed alongside the signaling server for ICE candidate waterfall fallback.

# Listening ports
listening-port=3478
tls-listening-port=443

# No TLS termination at coturn level (DTLS inside WebRTC provides encryption)
# TLS is optional; the WebRTC DTLS layer is sufficient for security
no-tls
no-dtls

# Relay interface — use the Fly.io private IP or 0.0.0.0
relay-device=eth0
relay-ip=0.0.0.0

# External IP for relayed candidates — set via env var at runtime
external-ip=${EXTERNAL_IP:?EXTERNAL_IP must be set}

# Enable STUN binding response
stun-only=0

# Enable TURN relay
no-stun=0

# Allow all users (auth is handled via ephemeral HMAC credentials)
no-auth=0
use-auth-secret
static-auth-secret=${TURN_SECRET:?TURN_SECRET must be set}

# Realm (must match the signaling server's realm for HMAC validation)
realm=smartid2.turn

# Time-limited credentials (5 minutes)
user-quota=1
total-quota=10

# Logging
syslog
verbose=1

# Fingerprints in STUN messages
fingerprint

# No CLI
no-cli
